<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<link rel="stylesheet" href="style.css">
</head>

<body onload="initAdmin()">

<header>
  <h2 class="logo"><a href="index.html">TechAcademy</a></h2>
  <button onclick="logout()">Sair</button>
</header>

<div class="dashboard">

  <h2 class="saudacao">Painel do Administrador</h2>

  <!-- TABS -->
  <div class="tabs">
    <button onclick="mostrar('cursos', this)" class="ativo">Cursos</button>
    <button onclick="mostrar('usuarios', this)">Alunos</button>
    <button onclick="mostrar('gestores', this)">Gestores</button>
    <button onclick="mostrar('admins', this)">Admins</button>
  </div>

  <!-- CONTEÚDO -->
  <div id="conteudo"></div>

</div>

<script src="db.js"></script>
<script src="auth.js"></script>

<script>

/* =========================
   INICIALIZAÇÃO
========================= */

function initAdmin(){

  let user = getUsuarioLogado();

  if(!user || user.tipo !== "admin"){
    alert("Acesso negado!");
    window.location.href = "login.html";
    return;
  }

  mostrar("cursos", document.querySelector(".tabs button"));
}


/* =========================
   TABS
========================= */

function mostrar(tipo, el){

  document.querySelectorAll(".tabs button")
    .forEach(b => b.classList.remove("ativo"));

  el.classList.add("ativo");

  if(tipo === "cursos") renderCursos();
  if(tipo === "usuarios") renderUsuarios();
  if(tipo === "gestores") renderGestores();
  if(tipo === "admins") renderAdmins();
}


/* =========================
   CURSOS
========================= */

let cursos = JSON.parse(localStorage.getItem("cursos")) || [];

function renderCursos(){

  document.getElementById("conteudo").innerHTML = `

    <div class="card">
      <h3>Novo Curso</h3>
      <input id="cursoNome" placeholder="Nome do curso">
      <input id="cursoTempo" placeholder="Tempo (ex: 2h 30min)">
      <button onclick="criarCurso()">Criar Curso</button>
    </div>

    <div class="cursos">
      ${cursos.map(c => `
        <div class="card">
          <h3>${c.nome}</h3>
          <p>${c.tempo || ""}</p>
        </div>
      `).join("")}
    </div>
  `;
}

function criarCurso(){
  let nome = document.getElementById("cursoNome").value;
  let tempo = document.getElementById("cursoTempo").value;

  if(!nome) return alert("Digite o nome do curso");

  cursos.push({
    id: Date.now(),
    nome,
    tempo
  });

  localStorage.setItem("cursos", JSON.stringify(cursos));

  renderCursos();
}


/* =========================
   ALUNOS
========================= */

function renderUsuarios(){

  document.getElementById("conteudo").innerHTML = `

    <div class="cursos">
      ${alunos.map(a => `
        <div class="card">
          <h3>${a.nome}</h3>
          <p>Login: ${a.login}</p>
          <p>Cursos: ${a.cursos?.length || 0}</p>
        </div>
      `).join("")}
    </div>
  `;
}


/* =========================
   GESTORES
========================= */

function renderGestores(){

  document.getElementById("conteudo").innerHTML = `

    <div class="card">
      <h3>Novo Gestor</h3>
      <input id="gNome" placeholder="Nome">
      <input id="gLogin" placeholder="Login">
      <input id="gSenha" placeholder="Senha">
      <button onclick="criarGestor()">Criar</button>
    </div>

    <div class="cursos">
      ${gestores.map(g => `
        <div class="card">
          <h3>${g.nome || "Gestor"}</h3>
          <p>${g.login}</p>
        </div>
      `).join("")}
    </div>
  `;
}

function criarGestor(){

  let nome = document.getElementById("gNome").value;
  let login = document.getElementById("gLogin").value;
  let senha = document.getElementById("gSenha").value;

  if(!login || !senha) return alert("Preencha tudo");

  if(gestores.find(g => g.login === login)){
    return alert("Login já existe");
  }

  gestores.push({ nome, login, senha });

  salvar();

  renderGestores();
}


/* =========================
   ADMINS
========================= */

function renderAdmins(){

  document.getElementById("conteudo").innerHTML = `

    <div class="card">
      <h3>Novo Admin</h3>
      <input id="aNome" placeholder="Nome">
      <input id="aLogin" placeholder="Login">
      <input id="aSenha" placeholder="Senha">
      <button onclick="criarAdmin()">Criar</button>
    </div>

    <div class="cursos">
      ${admins.map(a => `
        <div class="card">
          <h3>${a.nome || "Admin"}</h3>
          <p>${a.login}</p>
        </div>
      `).join("")}
    </div>
  `;
}

function criarAdmin(){

  let nome = document.getElementById("aNome").value;
  let login = document.getElementById("aLogin").value;
  let senha = document.getElementById("aSenha").value;

  if(!login || !senha) return alert("Preencha tudo");

  if(admins.find(a => a.login === login)){
    return alert("Login já existe");
  }

  admins.push({ nome, login, senha });

  salvar();

  renderAdmins();
}

</script>

</body>
</html>
